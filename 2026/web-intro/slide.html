<h2 id="html%E3%81%AE%E3%82%BF%E3%82%B0%E3%81%A8%E3%81%AF">HTMLの「タグ」とは</h2>
<p>HTMLは <strong>タグ</strong> という目印を使って書きます。</p>
<p>タグをつけることで、ブラウザに <strong>「これは見出しだよ」「これは文章だよ」</strong> と伝えます。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-html"><span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>田中 はなこ<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>
</code></pre>
<ul>
<li><code>&lt;h1&gt;</code> → 「ここから見出し」（開始タグ）</li>
<li><code>&lt;/h1&gt;</code> → 「見出しここまで」（終了タグ。<code>/</code> がつく）</li>
</ul>
<p>タグで囲まれた部分が、そのタグの種類に応じて表示される。</p>
</section>

<h2 id="%E4%BB%8A%E5%9B%9E%E4%BD%BF%E3%81%86%E3%82%BF%E3%82%B0">今回使うタグ</h2>
<table>
<thead>
<tr>
<th>タグ</th>
<th>意味</th>
<th>表示</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>&lt;h1&gt;</code></td>
<td>見出し（一番大きい）</td>
<td><strong>太く大きい文字</strong></td>
</tr>
<tr>
<td><code>&lt;p&gt;</code></td>
<td>段落（パラグラフ）</td>
<td>ふつうの文章</td>
</tr>
<tr>
<td><code>&lt;div&gt;</code></td>
<td>グループ化する箱</td>
<td>見た目は何もない（CSSで変える）</td>
</tr>
</tbody>
</table>
<p><code>&lt;div&gt;</code> は <strong>他のタグをまとめるための入れ物</strong> として使います。</p>
<blockquote>
<p>なぜまとめるの？ → まとめることで <strong>CSSをグループ単位で適用</strong> できる。<br />
例: ヘッダー全体に背景色をつけたい → <code>&lt;h1&gt;</code> と <code>&lt;p&gt;</code> を <code>&lt;div&gt;</code> でまとめて、その <code>&lt;div&gt;</code> に背景色を指定する。</p>
</blockquote>

<h2 id="css%E3%81%AE%E6%9B%B8%E3%81%8D%E6%96%B9">CSSの書き方</h2>
<p>次に見た目を整えます。CSSは <code>styles.css</code> に書きます。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-css">セレクタ {
  プロパティ: 値;
}
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-css"><span class="hljs-selector-tag">body</span> {              ← 「<span class="hljs-selector-tag">body</span> に対して」

}
</code></pre>
<ul>
<li><strong>セレクタ</strong> = どの要素に適用するか</li>
<li><strong>プロパティ</strong> = 何を変えるか</li>
<li><strong>値</strong> = どう変えるか</li>
</ul>

<h2 id="box-shadow-%E3%81%A8-rgba"><code>box-shadow</code> と <code>rgba()</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-css"><span class="hljs-attribute">box-shadow</span>: <span class="hljs-number">0</span> <span class="hljs-number">2px</span> <span class="hljs-number">12px</span> <span class="hljs-built_in">rgba</span>(<span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0.08</span>);
<span class="hljs-comment">/*          横  縦  ぼかし  色              */</span>
</code></pre>
<ul>
<li><code>0</code> → 横ずれなし、<code>2px</code> → 少し下、<code>12px</code> → ふんわりぼかし</li>
<li><code>rgba(0, 0, 0, 0.08)</code> → 黒の8%の濃さ（ほぼ透明な影）</li>
<li><code>rgba(赤, 緑, 青, 透明度)</code> — 透明度 <code>0</code>=透明 〜 <code>1</code>=不透明</li>
</ul>
