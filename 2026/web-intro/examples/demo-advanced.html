<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介ページ（応用課題デモ）</title>
  <style>
    /* ===== 全体の設定 ===== */
    body {
      margin: 0;
      padding: 0;
    }

    /* ===== 応用A: ダークモード ===== */
    body.dark {
      background-color: #1a1a2e;
      color: #e0e0e0;
    }
    body.dark .header {
      background-color: #2d2d5e;
    }
    body.dark .card {
      background-color: #16213e;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }
    body.dark .card h2 {
      color: #ffa0c4;
    }
    body.dark .badge {
      background-color: #2d2d5e;
      color: #e0e0e0;
    }
    body.dark .sns-link {
      background-color: #2d2d5e;
      color: #e0e0e0;
    }
    body.dark .sns-link:hover {
      background-color: #3d3d7e;
    }
    body.dark .tab-btn {
      background-color: #2d2d5e;
      color: #e0e0e0;
    }
    body.dark .tab-btn.active {
      background-color: #ff7eb3;
      color: #fff;
    }
    body.dark .quiz-btn {
      background-color: #2d2d5e;
      color: #e0e0e0;
      border-color: #3d3d7e;
    }
    body.dark .slideshow-btn {
      background-color: #2d2d5e;
      color: #e0e0e0;
    }

    /* ===== レイアウト ===== */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ===== ヘッダー ===== */
    .header {
      background-color: pink;
      text-align: center;
      padding: 40px 20px;
      border-radius: 0 0 20px 20px;
    }
    .header h1 {
      margin: 0;
      color: white;
    }
    .header p {
      margin: 8px 0 0;
      color: white;
    }

    /* ===== 応用D: 現在時刻 ===== */
    .clock {
      font-size: 14px;
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.85);
    }

    /* ===== 応用C: 訪問回数 ===== */
    .visit-count {
      font-size: 12px;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.7);
    }

    /* ===== カード（共通） ===== */
    .card {
      background-color: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    .card h2 {
      font-size: 20px;
      margin: 0 0 12px;
      color: hotpink;
    }

    /* ===== プロフィールセクション ===== */
    .profile {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid pink;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .profile-img:hover {
      transform: scale(1.05);
    }
    .profile-text p {
      margin: 4px 0;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ===== 応用B: いいねボタン ===== */
    .like-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 16px;
      border: 2px solid #ff7eb3;
      border-radius: 20px;
      background: none;
      color: #ff7eb3;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .like-btn:hover {
      background-color: #ff7eb3;
      color: #fff;
    }
    .like-btn.liked {
      background-color: #ff7eb3;
      color: #fff;
    }

    /* ===== 応用F: スライドショー ===== */
    .slideshow {
      text-align: center;
    }
    .slideshow-img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 12px;
    }
    .slideshow-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
    }
    .slideshow-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background-color: #ff9a9e;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .slideshow-btn:hover {
      background-color: #ff7eb3;
    }
    .slideshow-counter {
      font-size: 14px;
      color: #999;
    }

    /* ===== 応用E: タブ切り替え ===== */
    .tab-header {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 20px;
      background-color: #f0f0f0;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background-color: #ff7eb3;
      color: #fff;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    /* ===== 好きなものリスト ===== */
    .favorites-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .favorites-list li {
      padding: 8px 0;
      font-size: 15px;
      border-bottom: 1px dashed #eee;
      cursor: grab;
      transition: opacity 0.2s, background-color 0.2s;
    }
    .favorites-list li:last-child {
      border-bottom: none;
    }
    .favorites-list li::before {
      content: "♡ ";
      color: hotpink;
    }

    /* ===== 応用I: ドラッグ ===== */
    .favorites-list li.dragging {
      opacity: 0.4;
    }
    .favorites-list li.drag-over {
      background-color: #fff0f3;
      border-radius: 8px;
    }
    .drag-hint {
      font-size: 12px;
      color: #bbb;
      margin-top: 8px;
    }

    /* ===== スキルバッジ ===== */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .badge {
      background-color: mistyrose;
      color: hotpink;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }

    /* ===== SNSリンク ===== */
    .sns-links {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .sns-link {
      display: inline-block;
      padding: 10px 20px;
      background-color: pink;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: bold;
    }

    .sns-link:hover {
      background-color: hotpink;
    }

    /* ===== 応用J: ミニクイズ ===== */
    .quiz-question {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
    }
    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quiz-btn {
      padding: 10px 16px;
      border: 2px solid #fad0c4;
      border-radius: 12px;
      background: none;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .quiz-btn:hover {
      border-color: #ff7eb3;
      background-color: #fff0f3;
    }
    .quiz-btn.correct {
      border-color: #4caf50;
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    .quiz-btn.wrong {
      border-color: #ef5350;
      background-color: #ffebee;
      color: #c62828;
    }
    .quiz-result {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      display: none;
    }
    .quiz-result.show {
      display: block;
    }
    .quiz-next {
      margin-top: 12px;
      padding: 8px 20px;
      border: none;
      border-radius: 20px;
      background-color: #ff9a9e;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: none;
    }
    .quiz-next.show {
      display: inline-block;
    }
    .quiz-score {
      margin-top: 8px;
      font-size: 13px;
      color: #999;
    }

    /* ===== 応用A: ダークモードボタン ===== */
    .dark-mode-btn {
      display: block;
      margin: 24px auto 40px;
      padding: 10px 24px;
      border: 2px solid #ccc;
      border-radius: 25px;
      background: none;
      font-size: 14px;
      cursor: pointer;
      color: inherit;
      transition: border-color 0.3s;
    }
    .dark-mode-btn:hover {
      border-color: #ff7eb3;
    }

    /* ===== 応用H: モーダル ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.show {
      display: flex;
    }
    .modal-content {
      position: relative;
      max-width: 90%;
      max-height: 90%;
    }
    .modal-img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 16px;
    }
    .modal-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background-color: #fff;
      color: #333;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* ===== 応用G: カスタムカーソル ===== */
    .custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background-color: #ff7eb3;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s;
      mix-blend-mode: difference;
    }
    .cursor-particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ff9a9e;
      pointer-events: none;
      z-index: 9998;
      animation: particle-fade 0.6s ease-out forwards;
    }
    @keyframes particle-fade {
      0% {
        opacity: 0.8;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
      }
    }
  </style>
</head>
<body>

  <!-- 応用G: カスタムカーソル -->
  <div class="custom-cursor" id="customCursor"></div>

  <!-- 応用H: モーダル -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">✕</button>
      <img
        src="https://api.dicebear.com/7.x/thumbs/svg?seed=Hanako&backgroundColor=ffdfbf&size=400"
        alt="プロフィール写真（拡大）"
        class="modal-img"
      >
    </div>
  </div>

  <!-- ヘッダー -->
  <div class="header">
    <h1>田中 はなこ</h1>
    <p>Web開発をはじめたばかりの大学生です！</p>
    <!-- 応用D: 現在時刻 -->
    <div class="clock" id="clock">now loading...</div>
    <!-- 応用C: 訪問回数 -->
    <div class="visit-count" id="visitCount"></div>
  </div>

  <!-- メインコンテンツ -->
  <div class="container">

    <!-- プロフィール -->
    <div class="card">
      <div class="profile">
        <!-- 応用H: 写真クリックでモーダル -->
        <img
          src="https://api.dicebear.com/7.x/thumbs/svg?seed=Hanako&backgroundColor=ffdfbf"
          alt="プロフィール写真"
          class="profile-img"
          id="profileImg"
        >
        <div class="profile-text">
          <p>こんにちは！田中はなこです。</p>
          <p>東京に住んでいて、カフェ巡りと猫が好きです。最近プログラミングを始めました！</p>
          <!-- 応用B: いいねボタン -->
          <button class="like-btn" id="likeBtn">♡ 0 いいね</button>
        </div>
      </div>
    </div>

    <!-- 応用F: フォトギャラリー（スライドショー） -->
    <div class="card">
      <h2>フォトギャラリー</h2>
      <div class="slideshow">
        <img
          src="https://api.dicebear.com/7.x/shapes/svg?seed=photo1"
          alt="写真"
          class="slideshow-img"
          id="slideshowImg"
        >
        <div class="slideshow-controls">
          <button class="slideshow-btn" id="prevBtn">←</button>
          <span class="slideshow-counter" id="slideshowCounter">1 / 3</span>
          <button class="slideshow-btn" id="nextBtn">→</button>
        </div>
      </div>
    </div>

    <!-- 応用E: タブ切り替え + 応用I: ドラッグで並び替え -->
    <div class="card">
      <div class="tab-header">
        <button class="tab-btn active" data-tab="likes">好きなもの</button>
        <button class="tab-btn" data-tab="dislikes">苦手なもの</button>
      </div>

      <div class="tab-content active" id="tab-likes">
        <ul class="favorites-list" id="likesList">
          <li draggable="true">カフェ巡り</li>
          <li draggable="true">猫</li>
          <li draggable="true">ラーメン</li>
          <li draggable="true">音楽を聴くこと</li>
          <li draggable="true">写真を撮ること</li>
        </ul>
        <div class="drag-hint">↕ ドラッグで並び替えできます</div>
      </div>

      <div class="tab-content" id="tab-dislikes">
        <ul class="favorites-list">
          <li>早起き</li>
          <li>虫</li>
          <li>満員電車</li>
        </ul>
      </div>
    </div>

    <!-- スキル -->
    <div class="card">
      <h2>できること・学んでいること</h2>
      <div class="badges">
        <span class="badge">HTML</span>
        <span class="badge">CSS</span>
        <span class="badge">JavaScript</span>
        <span class="badge">写真</span>
        <span class="badge">デザイン</span>
      </div>
    </div>

    <!-- SNSリンク -->
    <div class="card">
      <h2>SNS</h2>
      <div class="sns-links">
        <a href="#" class="sns-link">X</a>
        <a href="#" class="sns-link">Instagram</a>
        <a href="#" class="sns-link">GitHub</a>
      </div>
    </div>

    <!-- 応用J: ミニクイズ -->
    <div class="card">
      <h2>ミニクイズ</h2>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-result" id="quizResult"></div>
      <button class="quiz-next" id="quizNext">次の問題 →</button>
      <div class="quiz-score" id="quizScore"></div>
    </div>

    <!-- 応用A: ダークモードボタン -->
    <button class="dark-mode-btn" id="darkModeBtn">🌙 ダークモード</button>

  </div>

  <script>
    // ===========================================
    // 応用A: ダークモード切替
    // ===========================================
    const darkModeBtn = document.getElementById("darkModeBtn");
    darkModeBtn.addEventListener("click", function() {
      document.body.classList.toggle("dark");
      if (document.body.classList.contains("dark")) {
        darkModeBtn.textContent = "☀️ ライトモード";
      } else {
        darkModeBtn.textContent = "🌙 ダークモード";
      }
    });

    // ===========================================
    // 応用B: いいねボタン
    // ===========================================
    let likeCount = 0;
    const likeBtn = document.getElementById("likeBtn");
    likeBtn.addEventListener("click", function() {
      likeCount = likeCount + 1;
      likeBtn.textContent = "♡ " + likeCount + " いいね";
      likeBtn.classList.add("liked");
    });

    // ===========================================
    // 応用C: ページ訪問回数（localStorage）
    // ===========================================
    let visits = localStorage.getItem("visitCount");
    if (visits === null) {
      visits = 0;
    }
    visits = Number(visits) + 1;
    localStorage.setItem("visitCount", visits);
    document.getElementById("visitCount").textContent = "このページは " + visits + " 回目の訪問です";

    // ===========================================
    // 応用D: 現在時刻の表示
    // ===========================================
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = "🕐 " + h + ":" + m + ":" + s;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ===========================================
    // 応用E: タブ切り替え
    // ===========================================
    const tabBtns = document.querySelectorAll(".tab-btn");
    for (let i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener("click", function() {
        // 全タブを非アクティブに
        for (let j = 0; j < tabBtns.length; j++) {
          tabBtns[j].classList.remove("active");
        }
        const allTabs = document.querySelectorAll(".tab-content");
        for (let j = 0; j < allTabs.length; j++) {
          allTabs[j].classList.remove("active");
        }
        // クリックされたタブをアクティブに
        this.classList.add("active");
        const tabId = "tab-" + this.getAttribute("data-tab");
        document.getElementById(tabId).classList.add("active");
      });
    }

    // ===========================================
    // 応用F: 画像スライドショー
    // ===========================================
    const photos = [
      "https://api.dicebear.com/7.x/shapes/svg?seed=photo1",
      "https://api.dicebear.com/7.x/shapes/svg?seed=photo2",
      "https://api.dicebear.com/7.x/shapes/svg?seed=photo3"
    ];
    let currentPhoto = 0;
    const slideshowImg = document.getElementById("slideshowImg");
    const slideshowCounter = document.getElementById("slideshowCounter");

    function updateSlideshow() {
      slideshowImg.src = photos[currentPhoto];
      slideshowCounter.textContent = (currentPhoto + 1) + " / " + photos.length;
    }

    document.getElementById("prevBtn").addEventListener("click", function() {
      currentPhoto = currentPhoto - 1;
      if (currentPhoto < 0) {
        currentPhoto = photos.length - 1;
      }
      updateSlideshow();
    });

    document.getElementById("nextBtn").addEventListener("click", function() {
      currentPhoto = currentPhoto + 1;
      if (currentPhoto >= photos.length) {
        currentPhoto = 0;
      }
      updateSlideshow();
    });

    // ===========================================
    // 応用H: モーダル（ポップアップ）
    // ===========================================
    const modal = document.getElementById("modal");
    const profileImg = document.getElementById("profileImg");
    const modalClose = document.getElementById("modalClose");

    profileImg.addEventListener("click", function() {
      modal.classList.add("show");
    });

    modalClose.addEventListener("click", function() {
      modal.classList.remove("show");
    });

    modal.addEventListener("click", function(e) {
      if (e.target === modal) {
        modal.classList.remove("show");
      }
    });

    // ===========================================
    // 応用I: ドラッグで並び替え
    // ===========================================
    const dragList = document.getElementById("likesList");
    let dragItem = null;

    dragList.addEventListener("dragstart", function(e) {
      dragItem = e.target;
      e.target.classList.add("dragging");
    });

    dragList.addEventListener("dragend", function(e) {
      e.target.classList.remove("dragging");
      const items = dragList.querySelectorAll("li");
      for (let i = 0; i < items.length; i++) {
        items[i].classList.remove("drag-over");
      }
      dragItem = null;
    });

    dragList.addEventListener("dragover", function(e) {
      e.preventDefault();
      const target = e.target;
      if (target.tagName === "LI" && target !== dragItem) {
        const items = dragList.querySelectorAll("li");
        for (let i = 0; i < items.length; i++) {
          items[i].classList.remove("drag-over");
        }
        target.classList.add("drag-over");
      }
    });

    dragList.addEventListener("drop", function(e) {
      e.preventDefault();
      const target = e.target;
      if (target.tagName === "LI" && target !== dragItem) {
        const allItems = Array.prototype.slice.call(dragList.querySelectorAll("li"));
        const dragIndex = allItems.indexOf(dragItem);
        const targetIndex = allItems.indexOf(target);
        if (dragIndex < targetIndex) {
          dragList.insertBefore(dragItem, target.nextSibling);
        } else {
          dragList.insertBefore(dragItem, target);
        }
      }
    });

    // ===========================================
    // 応用J: ミニクイズゲーム
    // ===========================================
    const quizData = [
      {
        question: "私の好きな食べ物は？",
        options: ["ラーメン", "寿司", "カレー"],
        answer: 0
      },
      {
        question: "私が住んでいるのは？",
        options: ["大阪", "東京", "福岡"],
        answer: 1
      },
      {
        question: "私の好きな動物は？",
        options: ["犬", "うさぎ", "猫"],
        answer: 2
      }
    ];
    let currentQuiz = 0;
    let quizCorrect = 0;
    let quizAnswered = false;

    function showQuiz() {
      const q = quizData[currentQuiz];
      document.getElementById("quizQuestion").textContent = "Q" + (currentQuiz + 1) + ". " + q.question;

      const optionsDiv = document.getElementById("quizOptions");
      optionsDiv.innerHTML = "";
      quizAnswered = false;

      for (let i = 0; i < q.options.length; i++) {
        const btn = document.createElement("button");
        btn.className = "quiz-btn";
        btn.textContent = q.options[i];
        btn.setAttribute("data-index", i);
        btn.addEventListener("click", function() {
          if (quizAnswered) return;
          quizAnswered = true;

          const selectedIndex = Number(this.getAttribute("data-index"));
          const correct = quizData[currentQuiz].answer;

          if (selectedIndex === correct) {
            this.classList.add("correct");
            quizCorrect++;
            document.getElementById("quizResult").textContent = "⭕ 正解！";
            document.getElementById("quizResult").style.backgroundColor = "#e8f5e9";
            document.getElementById("quizResult").style.color = "#2e7d32";
          } else {
            this.classList.add("wrong");
            const allBtns = optionsDiv.querySelectorAll(".quiz-btn");
            allBtns[correct].classList.add("correct");
            document.getElementById("quizResult").textContent = "❌ 残念！正解は「" + quizData[currentQuiz].options[correct] + "」";
            document.getElementById("quizResult").style.backgroundColor = "#ffebee";
            document.getElementById("quizResult").style.color = "#c62828";
          }

          document.getElementById("quizResult").classList.add("show");
          document.getElementById("quizScore").textContent = quizCorrect + " / " + (currentQuiz + 1) + " 問正解";

          if (currentQuiz < quizData.length - 1) {
            document.getElementById("quizNext").classList.add("show");
          } else {
            document.getElementById("quizScore").textContent = "結果: " + quizCorrect + " / " + quizData.length + " 問正解！";
          }
        });
        optionsDiv.appendChild(btn);
      }

      document.getElementById("quizResult").classList.remove("show");
      document.getElementById("quizNext").classList.remove("show");
    }

    document.getElementById("quizNext").addEventListener("click", function() {
      currentQuiz++;
      showQuiz();
    });

    showQuiz();

    // ===========================================
    // 応用G: カスタムカーソル + パーティクル
    // ===========================================
    const cursor = document.getElementById("customCursor");
    let particleCount = 0;

    document.addEventListener("mousemove", function(e) {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";

      // パーティクルを間引く（3回に1回だけ生成）
      particleCount++;
      if (particleCount % 3 !== 0) return;

      const particle = document.createElement("div");
      particle.className = "cursor-particle";
      particle.style.left = e.clientX + "px";
      particle.style.top = e.clientY + "px";
      document.body.appendChild(particle);

      // アニメーション終了後に削除
      setTimeout(function() {
        particle.remove();
      }, 600);
    });
  </script>

</body>
</html>
