<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>自己紹介ページ</title>
  </head>
  <body>
    <!-- ヘッダー -->
    <div class="header">
      <h1>田中 はなこ</h1>
      <p>Web開発をはじめたばかりの大学生です！</p>
    </div>

    <!-- メインコンテンツ -->
    <div class="container">
      <!-- プロフィール -->
      <div class="card">
        <div class="profile">
          <img
            src="https://api.dicebear.com/7.x/thumbs/svg?seed=Hanako&backgroundColor=ffdfbf"
            alt="プロフィール写真"
            class="profile-img"
          />
          <div class="profile-text">
            <p>こんにちは！田中はなこです。</p>
            <p>
              東京に住んでいて、カフェ巡りと猫が好きです。最近プログラミングを始めました！
            </p>
          </div>
        </div>
      </div>

      <!-- 好きなもの -->
      <div class="card">
        <h2>好きなもの</h2>
        <ul class="favorites-list">
          <li>カフェ巡り</li>
          <li>猫</li>
          <li>ラーメン</li>
          <li>音楽を聴くこと</li>
          <li>写真を撮ること</li>
        </ul>
      </div>

      <!-- スキル -->
      <div class="card">
        <h2>できること・学んでいること</h2>
        <div class="badges">
          <span class="badge">HTML</span>
          <span class="badge">CSS</span>
          <span class="badge">JavaScript</span>
          <span class="badge">写真</span>
          <span class="badge">デザイン</span>
        </div>
      </div>

      <!-- SNSリンク -->
      <div class="card">
        <h2>SNS</h2>
        <div class="sns-links">
          <a href="#" class="sns-link">X</a>
          <a href="#" class="sns-link">Instagram</a>
          <a href="#" class="sns-link">GitHub</a>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
